services:
  caddy:
    image: docker.io/library/caddy:2-alpine
    container_name: cfai_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    environment:
      - DOMAIN=${DOMAIN:-194.87.69.220.nip.io}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: cfai_db
    restart: always
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
  redis:
    image: docker.io/library/redis:8-alpine
    container_name: cfai_redis
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
  api:
    image: ghcr.io/q-user/chatflow-ai:latest
    container_name: cfai_api
    restart: always
    env_file:
      - .env
    command: >
      sh -c "alembic upgrade head && uvicorn presentation.api.main:app --host 0.0.0.0 --port 8000"

    # FastAPI доступен только внутри Docker network через Caddy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
  celery_worker:
    image: ghcr.io/q-user/chatflow-ai:latest
    container_name: cfai_worker
    restart: always
    command: celery -A infrastructure.task_queue.celery_app worker -l info --concurrency=1 --max-tasks-per-child=50
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'celery worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 512M
volumes:
  db-data:
  caddy-data:
  caddy-config:
