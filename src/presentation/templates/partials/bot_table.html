<!-- Partial: bot list table (HTMX swap target) -->
{% if bots %}
<table class="min-w-full divide-y divide-gray-200 text-sm">
  <thead class="bg-gray-50">
    <tr>
      <th class="px-4 py-3 text-left font-medium text-gray-500">ID</th>
      <th class="px-4 py-3 text-left font-medium text-gray-500">Тип</th>
      <th class="px-4 py-3 text-left font-medium text-gray-500">Модуль</th>
      <th class="px-4 py-3 text-left font-medium text-gray-500">Статус</th>
      <th class="px-4 py-3 text-left font-medium text-gray-500">Действия</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-gray-200">
    {% for bot in bots %}
    <tr class="hover:bg-gray-50">
      <td class="px-4 py-3 font-mono text-xs">{{ bot.id }}</td>
      <td class="px-4 py-3">{{ bot.messenger_type }}</td>
      <td class="px-4 py-3">{{ bot.module_type }}</td>
      <td class="px-4 py-3">
        <span class="inline-flex rounded-full px-2 text-xs font-semibold
          {% if bot.status == 'active' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">
          {{ bot.status }}
        </span>
      </td>
      <td class="px-4 py-3">
        <button hx-post="/bots/{{ bot.id }}/toggle"
                hx-target="#bot-table"
                hx-swap="innerHTML"
                hx-confirm="{{ 'Деактивировать' if bot.status == 'active' else 'Активировать' }} бота?"
                class="text-indigo-600 hover:text-indigo-900 text-xs">
          {{ 'Деактивировать' if bot.status == 'active' else 'Активировать' }}
        </button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-gray-500 text-sm">Нет ботов. Добавьте первого!</p>
{% endif %}
