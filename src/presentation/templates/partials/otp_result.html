{% if error %}
<div class="mt-3 rounded-md bg-red-50 p-4 text-sm text-red-700">
  {{ error }}
</div>
{% else %}
<div class="mt-3 rounded-md bg-green-50 p-4 text-center">
  <p class="text-3xl font-mono font-bold tracking-widest text-green-700">{{ code }}</p>
  <p class="mt-2 text-sm text-green-600">Отправьте этот код вашему боту в течение 5 минут</p>
</div>
{% endif %}
