<!-- Inline edit form — replaces bot_row.html when editing -->
{% set current_provider = (bot.config or {}).get('llm_routing', {}).get('provider', '') %}
{% set current_model = (bot.config or {}).get('llm_routing', {}).get('model', '') %}
<tr>
  <td colspan="5" class="px-4 py-3 bg-gray-50">
    <form hx-post="/bots/{{ bot.id }}/edit"
          hx-target="closest tr"
          hx-swap="outerHTML"
          class="grid grid-cols-7 gap-3 items-end">

      <div>
        <label class="block text-xs font-medium text-gray-700">Token</label>
        <input type="text" name="token" value="{{ bot.token }}" required
               class="mt-1 block w-full rounded-md border border-gray-300 px-2 py-1.5 text-xs shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-700">Messenger</label>
        <select name="messenger_type" required
                class="mt-1 block w-full rounded-md border border-gray-300 px-2 py-1.5 text-xs shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          <option value="TG" {% if bot.messenger_type == 'TG' %}selected{% endif %}>Telegram</option>
          <option value="YM" {% if bot.messenger_type == 'YM' %}selected{% endif %}>Yandex Messenger</option>
          <option value="MX" {% if bot.messenger_type == 'MX' %}selected{% endif %}>MAX (eXpress)</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-700">Модуль</label>
        <select name="module_type" required
                class="mt-1 block w-full rounded-md border border-gray-300 px-2 py-1.5 text-xs shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          {% for mod in available_modules %}
          <option value="{{ mod }}" {% if bot.module_type == mod %}selected{% endif %}>{{ mod | capitalize }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-700">Secret</label>
        <input type="text" name="secret" value="{{ bot.secret or '' }}"
               class="mt-1 block w-full rounded-md border border-gray-300 px-2 py-1.5 text-xs shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-700">AI Provider</label>
        <select name="ai_provider" id="edit_ai_provider_{{ bot.id }}" required
                class="mt-1 block w-full rounded-md border border-gray-300 px-2 py-1.5 text-xs shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          {% for key, provider in ai_providers.items() %}
          <option value="{{ key }}" {% if current_provider == key %}selected{% endif %}>{{ provider.label }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-700">AI Model</label>
        <select name="ai_model" id="edit_ai_model_{{ bot.id }}" required
                class="mt-1 block w-full rounded-md border border-gray-300 px-2 py-1.5 text-xs shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        </select>
      </div>

      <div class="flex gap-2">
        <button type="submit"
                class="rounded-md bg-indigo-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-indigo-500">
          Сохранить
        </button>
        <button type="button"
                hx-get="/bots/{{ bot.id }}/row"
                hx-target="closest tr"
                hx-swap="outerHTML"
                class="rounded-md bg-gray-200 px-3 py-1.5 text-xs font-semibold text-gray-700 hover:bg-gray-300">
          Отмена
        </button>
      </div>
    </form>
  </td>
</tr>

<script>
  (function() {
    var providers = {{ ai_providers | tojson }};
    var providerSel = document.getElementById('edit_ai_provider_{{ bot.id }}');
    var modelSel = document.getElementById('edit_ai_model_{{ bot.id }}');
    var currentModel = '{{ current_model }}';

    function updateModels() {
      var pid = providerSel.value;
      var models = providers[pid] ? providers[pid].models : [];
      modelSel.innerHTML = '';
      models.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.label;
        if (currentModel && m.id === currentModel) {
          opt.selected = true;
        }
        modelSel.appendChild(opt);
      });
    }

    providerSel.addEventListener('change', updateModels);
    updateModels();
  })();
</script>
