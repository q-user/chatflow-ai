<!-- Partial: add bot form (HTMX injects into #bot-form-container) -->
<form hx-post="/bots"
      hx-target="#bot-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="mb-6 grid grid-cols-6 gap-4 items-end">

  <div>
    <label class="block text-sm font-medium text-gray-700">Token</label>
    <input type="text" name="token" required
           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Messenger</label>
    <select name="messenger_type" required
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      <option value="TG">Telegram</option>
      <option value="YM">Yandex Messenger</option>
      <option value="MX">MAX (eXpress)</option>
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Модуль</label>
    <select name="module_type" required
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      {% for mod in available_modules %}
      <option value="{{ mod }}">{{ mod | capitalize }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Secret <span class="text-xs text-gray-400">(MAX — автогенерация, если пусто)</span></label>
    <input type="text" name="secret"
           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">AI Provider</label>
    <select name="ai_provider" id="ai_provider" required
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      {% for key, provider in ai_providers.items() %}
      <option value="{{ key }}">{{ provider.label }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">AI Model</label>
    <select name="ai_model" id="ai_model" required
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
    </select>
  </div>

  <button type="submit"
          class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">
    Создать
  </button>
</form>

<script>
  (function() {
    var providers = {{ ai_providers | tojson }};
    var providerSel = document.getElementById('ai_provider');
    var modelSel = document.getElementById('ai_model');

    function updateModels() {
      var pid = providerSel.value;
      var models = providers[pid] ? providers[pid].models : [];
      modelSel.innerHTML = '';
      models.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.label;
        modelSel.appendChild(opt);
      });
    }

    providerSel.addEventListener('change', updateModels);
    updateModels();
  })();

  document.querySelector('#bot-form-container form')
    .addEventListener('htmx:afterRequest', function(event) {
      if (event.detail.successful) {
        // Hide the form after successful creation
        this.closest('#bot-form-container').innerHTML = '';
      }
    });
</script>
